<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OpenMnemex</title>
<link rel="icon" href="/static/logo.svg" type="image/svg+xml">
<!-- Theme boots before first paint so a stored choice never flashes the other theme.
     No stored choice → no data-theme attribute → the OS media query governs. -->
<script>(function () {
  try {
    var t = localStorage.getItem("mnx-theme");
    if (t === "light" || t === "dark") document.documentElement.dataset.theme = t;
  } catch (e) { /* private mode etc. — fall back to OS */ }
}());</script>
<link rel="stylesheet" href="/static/css/theme.css">
<link rel="stylesheet" href="/static/css/app.css">
<!-- Vendored, offline (see vendor/VENDOR.md). Classic deferred scripts run in order,
     before the module below, per spec — fcose self-registers on the cytoscape global. -->
<script defer src="/static/vendor/cytoscape.min.js"></script>
<script defer src="/static/vendor/layout-base.js"></script>
<script defer src="/static/vendor/cose-base.js"></script>
<script defer src="/static/vendor/cytoscape-fcose.js"></script>
<script defer src="/static/vendor/marked.min.js"></script>
<script defer src="/static/vendor/purify.min.js"></script>
<script type="module" src="/static/js/app.js"></script>
</head>
<body>
<header id="header" class="header"></header>
<main id="view" class="view"></main>
<div id="toasts" class="toasts" aria-live="polite"></div>
</body>
</html>
